events {}

http {
    include       mime.types;
    default_type  application/octet-stream;

    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        font/ttf
        font/otf
        image/svg+xml;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Редирект с /blog/... на blog.harmex.ru/blog/...
    location ~ ^/blog(/.*)?$ {
        return 301 https://blog.harmex.ru$request_uri;
    }

    location = /robots.txt {
        if ($host = harmex.ru) {
            return 200 "User-agent: *\nAllow: /\nDisallow: /*?\n";
        }
        if ($host = www.harmex.ru) {
            return 200 "User-agent: *\nAllow: /\nDisallow: /*?\n";
        }
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # Основное правило для "чистых" URL (без .html)
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /404.html;
}

location = /robots.txt {
    if ($host = harmex.ru) {
        return 200 "User-agent: *\nAllow: /\nDisallow: /*?\n";  # Запрещаем только параметры
    }
    if ($host = www.harmex.ru) {
        return 200 "User-agent: *\nAllow: /\nDisallow: /*?\n";
    }
    # Для остальных доменов
    return 200 "User-agent: *\nDisallow: /\n";
}

        location / {
            try_files $uri $uri/ =404;
        }

        error_page 404 /404.html;
        
    }
}
