events {}

http {
     include       mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # редирект с /blog/... на blog.harmex.ru/blog/...
        location ~ ^/blog(/.*)?$ {
            return 301 https://blog.harmex.ru$request_uri;
        }

        location / {
            try_files $uri $uri/ =404;
        }

        error_page 404 /404.html;
    }
}
