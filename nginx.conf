events {}

http {
    include       mime.types;
    default_type  application/octet-stream;

    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        font/ttf
        font/otf
        image/svg+xml;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # 👇 Условие по домену — если app.landing.harmex.ru, добавить заголовок для запрета индексации
        if ($host = app.landing.harmex.ru) {
            add_header X-Robots-Tag "noindex, nofollow" always;
        }

        # редирект с /blog/... на blog.harmex.ru/blog/...
        location ~ ^/blog(/.*)?$ {
            return 301 https://blog.harmex.ru$request_uri;
        }

        location / {
            try_files $uri $uri/ =404;
        }

        error_page 404 /404.html;
    }
}
